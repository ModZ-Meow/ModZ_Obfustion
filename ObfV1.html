<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModZ Obfuscator</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#eaeaea;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
}

.ui{
    width:100%;
    max-width:520px;
    padding:14px;
    box-sizing:border-box;
}

h3{
    margin:10px 0;
    font-size:18px;
    color:#d0d0d0;
}

textarea{
    width:100%;
    height:180px;
    background:#111;
    color:#eaeaea;
    border:1px solid #333;
    padding:10px;
    margin-top:10px;
    resize:none;
    outline:none;
    font-size:13px;
    box-sizing:border-box;
}

.buttons{
    display:flex;
    gap:8px;
    margin-top:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    background:#1f1f1f;
    color:#eaeaea;
    cursor:pointer;
    font-weight:bold;
    font-size:13px;
    border:1px solid #333;
    transition:0.15s;
}

button:hover{
    background:#2a2a2a;
}

.output{
    margin-top:10px;
    padding:10px;
    background:#111;
    border:1px solid #333;
    min-height:180px;
    white-space:pre-wrap;
    word-wrap:break-word;
    font-size:13px;
}

/* syntax colors */
.char-blue{ color:#4aa3ff; }
.num-yellow{ color:#ffd84a; }
.sym-green{ color:#45ff9a; }
</style>
</head>

<body>

<div class="ui">

    <h3>ModZ Obfuscation V1.4</h3>

    <textarea id="input" placeholder="Paste Lua script here..."></textarea>

    <div class="buttons">
        <button onclick="idk()">Obfuscate</button>
        <button onclick="copyOut()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="output" id="output"></div>

</div>

<script>

function idk(){

    let raw = document.getElementById("input").value;

    if(!raw.trim()){
        alert("Paste script first");
        return;
    }

    let bytes = Array.from(raw).map(c => c.charCodeAt(0));

    let bc = [];

    let key = 0x55;
    let ip = 1;

    for(let b of bytes){
        key ^= ip;
        bc.push(0x01, b ^ key);
        ip += 2;
    }

    key ^= ip;
    bc.push(0x03, 0);

    let template = `--[[ ModZ Obfuscation V1.4 ]]--

local _VM = {
    S = {},
    IP = 1,
    BC = {${bc.join(",")}},
    K = 0x55
}

local _OPS = {
    [0x01] = function(v)
        table.insert(_VM.S, string.char(bit32.bxor(v, _VM.K)))
    end,

    [0x03] = function()
        local src = table.concat(_VM.S)
        local fn = (loadstring or load)(src)
        return fn()
    end
}

while _VM.IP <= #_VM.BC do
    local op = _VM.BC[_VM.IP]
    _VM.K = bit32.bxor(_VM.K, _VM.IP)

    local handler = _OPS[op]
    if handler then
        handler(_VM.BC[_VM.IP + 1])
    end

    _VM.IP = _VM.IP + 2
end`;

    document.getElementById("output").innerHTML = highlight(template);
}

/* ===== Syntax Highlighter ===== */
function highlight(text){

    let res = "";

    for(let i=0;i<text.length;i++){

        let c = text[i];

        if(/[a-zA-Z]/.test(c)){
            res += `<span class="char-blue">${c}</span>`;
        }
        else if(/[0-9]/.test(c)){
            res += `<span class="num-yellow">${c}</span>`;
        }
        else if(/[*()\\[\\]{}=%×+_\\-]/.test(c)){
            res += `<span class="sym-green">${c}</span>`;
        }
        else{
            res += c;
        }
    }

    return res;
}

/* Copy */
function copyOut(){
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

/* Clear */
function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("output").innerHTML = "";
}

</script>

</body>
  </html>
